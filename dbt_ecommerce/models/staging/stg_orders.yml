version: 2

models:
  - name: stg_orders
    description: "Cleaned e-commerce orders"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ["completed", "returned", "cancelled"]
      - name: total_eur
        tests:
          - not_null
